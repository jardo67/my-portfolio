<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="800" height="450" fill="#F7F7F5"/>
  <!-- Email client mockup showing the screenshot-and-email workflow -->
  <!-- Left: email thread -->
  <rect x="0" y="0" width="280" height="450" fill="#FFFFFF"/>
  <rect x="280" y="0" width="1" height="450" fill="#E8E8E8"/>
  <!-- Email list header -->
  <rect width="280" height="50" fill="#FFFFFF"/>
  <rect y="50" width="280" height="1" fill="#E8E8E8"/>
  <text x="16" y="32" fill="#111111" font-size="14" font-weight="700">Inbox</text>
  <rect x="216" y="15" width="50" height="20" rx="4" fill="#F0F0EE"/>
  <text x="241" y="29" fill="#6B6B6B" font-size="10" text-anchor="middle">Compose</text>
  <!-- Email items -->
  <rect x="0" y="51" width="280" height="72" fill="#EEF0FF"/>
  <rect x="0" y="51" width="3" height="72" fill="#4444CC"/>
  <text x="16" y="74" fill="#111111" font-size="11" font-weight="700">RE: Q3 Customer Data Update</text>
  <text x="16" y="90" fill="#6B6B6B" font-size="10">Petra Novakova · 2h ago</text>
  <text x="16" y="107" fill="#9B9B9B" font-size="10">Hi Jaro, here's the updated Q3 slide…</text>
  <rect x="0" y="123" width="280" height="1" fill="#E8E8E8"/>
  <rect x="0" y="124" width="280" height="72" fill="#FFFFFF"/>
  <text x="16" y="147" fill="#111111" font-size="11" font-weight="600">Q3 Report — final numbers?</text>
  <text x="16" y="163" fill="#6B6B6B" font-size="10">Daniel Kral · Yesterday</text>
  <text x="16" y="180" fill="#9B9B9B" font-size="10">Can we get the latest figures before…</text>
  <rect x="0" y="196" width="280" height="1" fill="#E8E8E8"/>
  <rect x="0" y="197" width="280" height="72" fill="#FFFFFF"/>
  <text x="16" y="220" fill="#111111" font-size="11" font-weight="600">Jira: DQ Dashboard update request</text>
  <text x="16" y="236" fill="#6B6B6B" font-size="10">Jira Notifications · 3 days ago</text>
  <text x="16" y="253" fill="#9B9B9B" font-size="10">Assigned: Create slide with August…</text>
  <rect x="0" y="269" width="280" height="1" fill="#E8E8E8"/>
  <rect x="0" y="270" width="280" height="72" fill="#FFFFFF"/>
  <text x="16" y="293" fill="#111111" font-size="11" font-weight="600">RE: Can you update the DQ numbers?</text>
  <text x="16" y="309" fill="#6B6B6B" font-size="10">Martin Horak · 4 days ago</text>
  <text x="16" y="326" fill="#9B9B9B" font-size="10">I'll need eng to pull the latest from…</text>
  <!-- Right: email content -->
  <rect x="281" y="0" width="519" height="450" fill="#FFFFFF"/>
  <!-- Email header -->
  <rect x="281" y="0" width="519" height="52" fill="#FFFFFF"/>
  <rect x="281" y="52" width="519" height="1" fill="#E8E8E8"/>
  <text x="300" y="24" fill="#111111" font-size="14" font-weight="700">RE: Q3 Customer Data Update</text>
  <text x="300" y="42" fill="#9B9B9B" font-size="11">Petra Novakova → Jaro Mlkvy, +3 others · 2h ago</text>
  <!-- Email body -->
  <text x="300" y="78" fill="#111111" font-size="12">Hi all,</text>
  <text x="300" y="98" fill="#333333" font-size="11">Please find the updated Q3 numbers below. Note these are from</text>
  <text x="300" y="114" fill="#333333" font-size="11">the dashboard as of Monday — the engineering team will update</text>
  <text x="300" y="130" fill="#333333" font-size="11">the live data next week when they have capacity.</text>
  <!-- Screenshot attachment (blurry/stale) -->
  <rect x="300" y="148" width="460" height="190" rx="6" fill="#F0F0EE" stroke="#E0E0DE" stroke-width="1"/>
  <rect x="300" y="148" width="460" height="28" rx="6" fill="#E8E8E8"/>
  <text x="320" y="167" fill="#9B9B9B" font-size="10">Q3_report_final_v3_MONDAY.png</text>
  <!-- Screenshot content (low-res style) -->
  <rect x="310" y="184" width="440" height="146" rx="3" fill="#FFFFFF" stroke="#E8E8E8" stroke-width="1"/>
  <rect x="320" y="192" width="120" height="12" rx="2" fill="#DDDDDD"/>
  <rect x="320" y="210" width="420" height="1" fill="#E8E8E8"/>
  <rect x="320" y="220" width="60" height="40" rx="3" fill="#F0F0EE"/>
  <rect x="390" y="220" width="60" height="40" rx="3" fill="#F0F0EE"/>
  <rect x="460" y="220" width="60" height="40" rx="3" fill="#F0F0EE"/>
  <rect x="530" y="220" width="60" height="40" rx="3" fill="#F0F0EE"/>
  <rect x="320" y="272" width="420" height="50" rx="2" fill="#F0F0EE"/>
  <text x="530" y="200" fill="#CC4422" font-size="9" font-weight="600">⚠ Data as of Sep 04 — may be stale</text>
  <!-- Reply buttons -->
  <rect x="300" y="350" width="76" height="28" rx="4" fill="#111111"/>
  <text x="338" y="368" fill="#FFFFFF" font-size="11" text-anchor="middle">Reply</text>
  <rect x="384" y="350" width="100" height="28" rx="4" fill="#F0F0EE"/>
  <text x="434" y="368" fill="#6B6B6B" font-size="11" text-anchor="middle">Reply all</text>
  <!-- Annotation -->
  <rect x="560" y="344" width="220" height="50" rx="4" fill="#FFFCE0" stroke="#EEE090" stroke-width="1"/>
  <text x="572" y="362" fill="#888800" font-size="10" font-weight="600">Avg 2h/week</text>
  <text x="572" y="376" fill="#888800" font-size="9">creating + updating these slides</text>
  <text x="572" y="388" fill="#888800" font-size="9">across 4 business analysts</text>
</svg>
