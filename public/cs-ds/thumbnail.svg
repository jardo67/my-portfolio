  <circle cx="76" cy="122" r="4" fill="#10B981"/>
  <text x="86" y="126" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#6B7280">orders · Q4 2023</text>

  <!-- Bar chart -->
  <rect x="72" y="222" width="40" height="114" rx="3" fill="#D8CCEF"/>
  <text x="92" y="216" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#9CA3AF">$2.1M</text>
  <rect x="128" y="186" width="40" height="150" rx="3" fill="#7B6BAE"/>
  <text x="148" y="180" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#7B6BAE">$2.8M</text>
  <rect x="184" y="206" width="40" height="130" rx="3" fill="#D8CCEF"/>
  <text x="204" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#9CA3AF">$2.4M</text>
  <rect x="240" y="166" width="40" height="170" rx="3" fill="#7B6BAE"/>
  <text x="260" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#7B6BAE">$3.2M</text>
  <rect x="296" y="194" width="40" height="142" rx="3" fill="#D8CCEF"/>
  <text x="316" y="188" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#9CA3AF">$2.6M</text>

  <!-- X axis labels -->
  <text x="92" y="352" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#9CA3AF">EMEA</text>
  <text x="148" y="352" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#9CA3AF">NA</text>
  <text x="204" y="352" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#9CA3AF">APAC</text>
  <text x="260" y="352" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#9CA3AF">LATAM</text>
  <text x="316" y="352" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#9CA3AF">MEA</text>

  <!-- Right properties panel -->
  <rect x="414" y="64" width="150" height="312" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>

  <text x="430" y="92" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF">CHART TYPE</text>
  <rect x="430" y="100" width="118" height="30" rx="6" fill="#F3F4F6"/>
  <text x="489" y="120" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#374151">Bar chart</text>

  <text x="430" y="152" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF">DIMENSION</text>
