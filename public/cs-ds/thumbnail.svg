  <text x="489" y="240" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#374151">SUM(amount)</text>

  <text x="430" y="272" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF">COLOR</text>
  <circle cx="442" cy="292" r="10" fill="#7B6BAE"/>
  <circle cx="464" cy="292" r="10" fill="#D8CCEF"/>
  <circle cx="486" cy="292" r="10" fill="#F0D0B8"/>
