<svg viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#F2F2F0"/>

  <!-- Store selector header -->
  <rect x="36" y="28" width="528" height="52" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="52" y="42" width="24" height="24" rx="6" fill="#F3F4F6"/>
  <text x="64" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13">⊞</text>
  <text x="86" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#111827">Main Branch — Bratislava</text>
  <text x="86" y="67" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#9CA3AF">Open now · Floor 1, 2</text>
  <rect x="492" y="41" width="56" height="24" rx="6" fill="#F3F4F6"/>
  <text x="520" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#374151">Today ▾</text>

  <!-- Metric card 1 -->
  <rect x="36" y="96" width="250" height="100" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="56" y="122" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#9CA3AF">Visitors today</text>
  <text x="56" y="156" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">1,284</text>
  <rect x="56" y="168" width="58" height="18" rx="4" fill="#D1FAE5"/>
  <text x="85" y="181" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#065F46">▲ 12%</text>
  <text x="122" y="181" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#9CA3AF">vs last Tue</text>

  <!-- Metric card 2 -->
  <rect x="302" y="96" width="262" height="100" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="322" y="122" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#9CA3AF">Peak hour</text>
  <text x="322" y="156" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#111827">3–4 PM</text>
  <text x="322" y="181" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#9CA3AF">214 visitors in that hour</text>

  <!-- Traffic chart card -->
  <rect x="36" y="212" width="528" height="160" rx="10" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="56" y="238" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#9CA3AF">Hourly foot traffic</text>

  <!-- X axis labels -->
  <text x="64" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#C4C4C0">9 AM</text>
  <text x="130" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#C4C4C0">11 AM</text>
  <text x="204" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#C4C4C0">1 PM</text>
  <text x="272" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#C4C4C0">3 PM</text>
  <text x="342" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#C4C4C0">5 PM</text>
  <text x="414" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#C4C4C0">7 PM</text>
  <text x="484" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#C4C4C0">9 PM</text>

  <!-- Area fill -->
  <path d="M64,338 L64,312 L96,294 L128,280 L160,272 L192,266 L224,257 L256,246 L288,254 L308,242 L320,240 L340,250 L372,260 L404,272 L436,284 L468,294 L500,304 L532,318 L532,338 Z" fill="#D8CCEF" opacity="0.4"/>
  <!-- Line -->
  <path d="M64,312 L96,294 L128,280 L160,272 L192,266 L224,257 L256,246 L288,254 L308,242 L320,240 L340,250 L372,260 L404,272 L436,284 L468,294 L500,304 L532,318" stroke="#7B6BAE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Peak dot at 3–4 PM -->
  <circle cx="320" cy="240" r="5" fill="#7B6BAE"/>
  <circle cx="320" cy="240" r="9" fill="#7B6BAE" opacity="0.2"/>
</svg>
