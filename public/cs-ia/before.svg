  <text x="630" y="82" fill="#6666AA" font-size="10">Export CSV</text>
  <text x="670" y="82" fill="#6666AA" font-size="10">Help</text>
  <!-- Date range picker (complex) -->
  <rect x="80" y="104" width="640" height="40" fill="#FFFFFF"/>
  <rect x="80" y="144" width="640" height="1" fill="#E8E8E8"/>
  <rect x="96" y="114" width="140" height="22" rx="3" fill="#F0F0EE" stroke="#E0E0DE" stroke-width="1"/>
