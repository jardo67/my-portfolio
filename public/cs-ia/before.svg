  <line x1="96" y1="274" x2="704" y2="274" stroke="#E8E8E8" stroke-width="1"/>
  <text x="112" y="270" fill="#333333" font-size="9">9:00 – 10:00</text>
  <text x="200" y="270" fill="#333333" font-size="9">142</text>
  <text x="296" y="270" fill="#333333" font-size="9">3:48</text>
  <text x="400" y="270" fill="#333333" font-size="9">5.6%</text>
  <text x="504" y="270" fill="#333333" font-size="9">0</text>
  <line x1="96" y1="288" x2="704" y2="288" stroke="#E8E8E8" stroke-width="1"/>
  <text x="112" y="284" fill="#333333" font-size="9">10:00 – 11:00</text>
  <text x="200" y="284" fill="#333333" font-size="9">287</text>
  <text x="296" y="284" fill="#333333" font-size="9">4:12</text>
  <text x="400" y="284" fill="#333333" font-size="9">6.1%</text>
  <text x="504" y="284" fill="#333333" font-size="9">1</text>
  <line x1="96" y1="302" x2="704" y2="302" stroke="#E8E8E8" stroke-width="1"/>
  <text x="112" y="298" fill="#333333" font-size="9">11:00 – 12:00</text>
  <text x="200" y="298" fill="#333333" font-size="9">341</text>
  <text x="296" y="298" fill="#333333" font-size="9">4:33</text>
  <text x="400" y="298" fill="#333333" font-size="9">7.2%</text>
  <text x="504" y="298" fill="#333333" font-size="9">2</text>
  <text x="300" y="388" fill="#9B9B9B" font-size="10" text-anchor="middle">… and 9 more rows · Download CSV for full data</text>
  <!-- Annotation: "No mobile app" -->
  <rect x="530" y="380" width="188" height="44" rx="4" fill="#FFF3F0" stroke="#FFCCCC" stroke-width="1"/>
  <text x="542" y="398" fill="#CC4422" font-size="10" font-weight="600">No mobile access</text>
  <text x="542" y="412" fill="#CC4422" font-size="9">Managers check this on laptops,</text>
  <text x="542" y="422" fill="#CC4422" font-size="9">only during office hours</text>
