  <text x="256" y="196" fill="#111111" font-size="18" font-weight="700">4:32</text>
  <text x="256" y="210" fill="#9B9B9B" font-size="8">↑ 22s vs last week</text>
  <rect x="384" y="158" width="136" height="60" rx="4" fill="#FFFFFF" stroke="#E8E8E8" stroke-width="1"/>
