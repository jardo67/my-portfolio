  <rect x="96" y="158" width="136" height="60" rx="4" fill="#FFFFFF" stroke="#E8E8E8" stroke-width="1"/>
  <text x="112" y="176" fill="#9B9B9B" font-size="8">Visitors</text>
  <text x="112" y="196" fill="#111111" font-size="18" font-weight="700">1,847</text>
  <text x="112" y="210" fill="#9B9B9B" font-size="8">↑ 14% vs last week</text>
  <rect x="240" y="158" width="136" height="60" rx="4" fill="#FFFFFF" stroke="#E8E8E8" stroke-width="1"/>
