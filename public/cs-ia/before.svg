  <rect x="420" y="114" width="80" height="22" rx="3" fill="#F0F0EE" stroke="#E0E0DE" stroke-width="1"/>
  <text x="460" y="129" fill="#6B6B6B" font-size="10" text-anchor="middle">Metric: ∨</text>
