  <text x="200" y="251" fill="#6B6B6B" font-size="9" font-weight="600">Visitors</text>
  <text x="296" y="251" fill="#6B6B6B" font-size="9" font-weight="600">Dwell Avg</text>
  <text x="400" y="251" fill="#6B6B6B" font-size="9" font-weight="600">Conversion</text>
  <text x="504" y="251" fill="#6B6B6B" font-size="9" font-weight="600">Queue Events</text>
