<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="800" height="450" fill="#F0F0EE"/>
  <!-- Desktop browser frame -->
  <rect x="80" y="20" width="640" height="410" rx="8" fill="#FFFFFF" stroke="#D0D0CE" stroke-width="1"/>
