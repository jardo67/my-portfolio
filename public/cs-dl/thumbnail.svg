    <text x="14" y="47" fill="#446644" font-size="8">4.1M rows · DQ: 94%</text>
    <circle cx="135" cy="14" r="5" fill="#22C55E"/>
  </g>
  <!-- Node G: sales_report (status: ok) -->
  <g transform="translate(540,290)">
    <rect width="152" height="54" rx="6" fill="#15152A" stroke="#252540" stroke-width="1"/>
    <rect width="4" height="54" rx="2" fill="#22C55E"/>
    <text x="14" y="18" fill="#555580" font-size="8" font-weight="700" letter-spacing="0.06em">OUTPUT</text>
    <text x="14" y="34" fill="#CCCCEE" font-size="11" font-weight="600">sales_report</text>
    <text x="14" y="47" fill="#555580" font-size="8">Daily agg · 3.8K rows</text>
    <circle cx="135" cy="14" r="5" fill="#22C55E"/>
