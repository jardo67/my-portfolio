    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.9" fill="#1E1E30"/>
    </pattern>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#383860"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Top bar -->
  <rect width="800" height="46" fill="#11111E"/>
  <rect y="46" width="800" height="1" fill="#222236"/>
  <!-- Breadcrumb -->
  <rect x="16" y="15" width="56" height="16" rx="3" fill="#222236"/>
  <text x="44" y="27" fill="#4A4A70" font-size="9" text-anchor="middle" font-weight="600">Catalog</text>
  <text x="78" y="27" fill="#333355" font-size="10">/</text>
  <rect x="84" y="15" width="90" height="16" rx="3" fill="#222236"/>
  <text x="129" y="27" fill="#4A4A70" font-size="9" text-anchor="middle" font-weight="600">Data Assets</text>
  <text x="180" y="27" fill="#333355" font-size="10">/</text>
  <rect x="186" y="15" width="110" height="16" rx="3" fill="#2A2A44"/>
  <text x="241" y="27" fill="#8888CC" font-size="9" text-anchor="middle" font-weight="600">customer_360</text>
  <!-- Controls top-right -->
