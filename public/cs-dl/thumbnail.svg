<svg viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#F2F2F0"/>

  <!-- Toolbar -->
  <rect width="600" height="44" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="16" y="14" width="56" height="16" rx="4" fill="#F3F4F6"/>
  <rect x="84" y="14" width="40" height="16" rx="4" fill="#F3F4F6"/>
  <rect x="136" y="14" width="40" height="16" rx="4" fill="#F3F4F6"/>
  <circle cx="562" cy="22" r="9" fill="#F3F4F6"/>
  <circle cx="540" cy="22" r="9" fill="#F3F4F6"/>

  <!-- Node 1: customers -->
  <rect x="36" y="108" width="148" height="88" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="52" y="131" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#9CA3AF">raw_db</text>
  <circle cx="53" cy="148" r="5" fill="#9CA3AF"/>
  <text x="64" y="152" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#111827">customers</text>
  <text x="52" y="170" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#C4C4C0">id · name · email</text>
  <text x="52" y="184" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#C4C4C0">created_at · status</text>

  <!-- Arrow: customers → orders -->
  <line x1="184" y1="152" x2="220" y2="152" stroke="#D1D5DB" stroke-width="1.5"/>
  <polygon points="220,147 220,157 228,152" fill="#D1D5DB"/>

  <!-- Node 2: orders (selected) -->
  <rect x="228" y="108" width="148" height="88" rx="8" fill="white" stroke="#7B6BAE" stroke-width="1.5"/>
  <text x="244" y="131" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#7B6BAE">raw_db</text>
  <circle cx="245" cy="148" r="5" fill="#7B6BAE"/>
  <text x="256" y="152" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#111827">orders</text>
  <text x="244" y="170" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#C4C4C0">id · customer_id</text>
  <text x="244" y="184" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#C4C4C0">amount · status</text>

  <!-- Arrow: orders → revenue_mart -->
  <line x1="376" y1="152" x2="408" y2="152" stroke="#D1D5DB" stroke-width="1.5"/>
  <polygon points="408,147 408,157 416,152" fill="#D1D5DB"/>

  <!-- Node 3: revenue_mart -->
  <rect x="416" y="108" width="148" height="88" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="432" y="131" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#9CA3AF">warehouse</text>
  <circle cx="433" cy="148" r="5" fill="#10B981"/>
  <text x="444" y="152" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#111827">revenue_mart</text>
  <text x="432" y="170" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#C4C4C0">total · by_region</text>
  <text x="432" y="184" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#C4C4C0">monthly_trend</text>

  <!-- Detail panel: orders fields -->
  <rect x="36" y="240" width="528" height="132" rx="8" fill="white" stroke="#7B6BAE" stroke-width="1"/>
  <text x="56" y="266" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#7B6BAE">orders — 4 columns</text>

  <!-- Field row 1 -->
  <rect x="56" y="276" width="32" height="18" rx="4" fill="#E0E7FF"/>
  <text x="72" y="289" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#3730A3">PK</text>
  <text x="100" y="289" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#111827">id</text>
  <text x="400" y="289" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#9CA3AF">INTEGER</text>

  <!-- Field row 2 -->
  <rect x="56" y="302" width="32" height="18" rx="4" fill="#D1FAE5"/>
  <text x="72" y="315" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#065F46">FK</text>
  <text x="100" y="315" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#111827">customer_id</text>
  <text x="400" y="315" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#9CA3AF">→ customers.id</text>

  <!-- Field row 3 -->
  <text x="100" y="341" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#111827">amount</text>
  <text x="400" y="341" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#9CA3AF">DECIMAL(10, 2)</text>

  <!-- Field row 4 -->
  <text x="100" y="362" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#111827">status</text>
  <text x="400" y="362" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#9CA3AF">VARCHAR(32)</text>
</svg>
