    <rect width="4" height="54" rx="2" fill="#22C55E"/>
    <text x="14" y="18" fill="#555580" font-size="8" font-weight="700" letter-spacing="0.06em">TABLE</text>
    <text x="14" y="34" fill="#CCCCEE" font-size="11" font-weight="600">products_db</text>
    <text x="14" y="47" fill="#555580" font-size="8">380K rows · DQ: 99%</text>
    <circle cx="131" cy="14" r="5" fill="#22C55E"/>
  </g>

  <!-- Col 2 transforms: x=305 -->
  <!-- Node D: cust_dq_check (status: warning) -->
  <g transform="translate(305,110)">
    <rect width="158" height="54" rx="6" fill="#15152A" stroke="#252540" stroke-width="1"/>
    <rect width="4" height="54" rx="2" fill="#EAB308"/>
    <text x="14" y="18" fill="#555580" font-size="8" font-weight="700" letter-spacing="0.06em">TRANSFORM</text>
    <text x="14" y="34" fill="#CCCCEE" font-size="11" font-weight="600">cust_dq_check</text>
    <text x="14" y="47" fill="#555580" font-size="8">DQ rule: 14 failures</text>
    <circle cx="141" cy="14" r="5" fill="#EAB308"/>
  </g>
  <!-- Node E: orders_enriched (status: ok) -->
  <g transform="translate(305,265)">
    <rect width="158" height="54" rx="6" fill="#15152A" stroke="#252540" stroke-width="1"/>
    <rect width="4" height="54" rx="2" fill="#22C55E"/>
    <text x="14" y="18" fill="#555580" font-size="8" font-weight="700" letter-spacing="0.06em">TRANSFORM</text>
