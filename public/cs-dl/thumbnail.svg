  <!-- EDGES (node center connections) -->
  <!-- A → D -->
  <path d="M 228,137 C 260,137 272,137 305,137" stroke="#383860" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- B → E -->
  <path d="M 228,247 C 260,247 272,292 305,292" stroke="#383860" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- C → E -->
  <path d="M 228,357 C 260,357 272,312 305,312" stroke="#383860" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- D → F -->
  <path d="M 463,137 C 496,137 508,187 540,187" stroke="#383860" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- E → F -->
  <path d="M 463,292 C 496,292 508,212 540,212" stroke="#383860" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- E → G -->
  <path d="M 463,292 C 496,292 508,317 540,317" stroke="#383860" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Right detail panel -->
  <rect x="710" y="47" width="90" height="403" fill="#11111E"/>
  <rect x="710" y="47" width="1" height="403" fill="#222236"/>
  <text x="755" y="80" fill="#555580" font-size="8" font-weight="700" letter-spacing="0.06em" text-anchor="middle">TABLE DETAIL</text>
  <rect x="720" y="90" width="70" height="1" fill="#222236"/>
  <text x="720" y="106" fill="#888890" font-size="8">Name</text>
  <text x="720" y="118" fill="#CCCCEE" font-size="9" font-weight="600">customer_360</text>
  <text x="720" y="136" fill="#888890" font-size="8">DQ Score</text>
  <rect x="720" y="142" width="70" height="8" rx="4" fill="#222236"/>
  <rect x="720" y="142" width="46" height="8" rx="4" fill="#22C55E" opacity="0.7"/>
  <text x="720" y="162" fill="#888890" font-size="8">Columns</text>
  <text x="720" y="174" fill="#CCCCEE" font-size="9" font-weight="600">47</text>
  <text x="720" y="192" fill="#888890" font-size="8">Rows</text>
  <text x="720" y="204" fill="#CCCCEE" font-size="9" font-weight="600">4.1M</text>
  <rect x="720" y="216" width="70" height="1" fill="#222236"/>
  <text x="720" y="232" fill="#555580" font-size="8" font-weight="700" letter-spacing="0.05em">UPSTREAM (2)</text>
  <rect x="720" y="238" width="70" height="20" rx="3" fill="#15152A" stroke="#252540" stroke-width="1"/>
  <text x="728" y="251" fill="#8888AA" font-size="8">cust_dq_check</text>
  <rect x="720" y="264" width="70" height="20" rx="3" fill="#15152A" stroke="#252540" stroke-width="1"/>
  <text x="728" y="277" fill="#8888AA" font-size="8">orders_enriched</text>
</svg>
