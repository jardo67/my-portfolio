  <circle cx="596" cy="23" r="5" fill="none" stroke="#383860" stroke-width="1.5"/>
  <line x1="600" y1="27" x2="603" y2="30" stroke="#383860" stroke-width="1.5"/>
  <text x="612" y="27" fill="#383860" font-size="9">Search lineage…</text>
  <rect x="722" y="13" width="30" height="20" rx="4" fill="#222236"/>
  <text x="737" y="26" fill="#4A4A70" font-size="10" text-anchor="middle">⊕</text>
  <rect x="758" y="13" width="30" height="20" rx="4" fill="#222236"/>
  <text x="773" y="26" fill="#4A4A70" font-size="10" text-anchor="middle">⊖</text>
  <!-- Left sidebar (icons only) -->
  <rect width="50" height="404" y="46" fill="#11111E"/>
  <rect x="50" y="46" width="1" height="404" fill="#222236"/>
