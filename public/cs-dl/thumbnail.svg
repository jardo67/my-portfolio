  <!-- Node F: customer_360 (selected/highlighted) -->
  <g transform="translate(540,160)">
    <rect width="152" height="54" rx="6" fill="#161E16" stroke="#2A4A2A" stroke-width="1.5"/>
    <rect width="4" height="54" rx="2" fill="#22C55E"/>
