  <circle cx="25" cy="114" r="10" fill="#2A2A44"/>
  <circle cx="25" cy="146" r="10" fill="#222236"/>
  <circle cx="25" cy="178" r="10" fill="#222236"/>
  <circle cx="25" cy="210" r="10" fill="#222236"/>

