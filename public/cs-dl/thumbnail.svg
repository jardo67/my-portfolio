  <!-- Col 1 sources: x=80 -->
  <!-- Node A: customers_raw (status: error) -->
  <g transform="translate(80,110)">
    <rect width="148" height="54" rx="6" fill="#15152A" stroke="#252540" stroke-width="1"/>
    <rect width="4" height="54" rx="2" fill="#EF4444"/>
    <text x="14" y="18" fill="#555580" font-size="8" font-weight="700" letter-spacing="0.06em">TABLE</text>
    <text x="14" y="34" fill="#CCCCEE" font-size="11" font-weight="600">customers_raw</text>
    <text x="14" y="47" fill="#555580" font-size="8">4.2M rows · DQ: 61%</text>
    <circle cx="131" cy="14" r="5" fill="#EF4444"/>
  </g>
  <!-- Node B: orders_raw (status: ok) -->
  <g transform="translate(80,220)">
    <rect width="148" height="54" rx="6" fill="#15152A" stroke="#252540" stroke-width="1"/>
    <rect width="4" height="54" rx="2" fill="#22C55E"/>
    <text x="14" y="18" fill="#555580" font-size="8" font-weight="700" letter-spacing="0.06em">TABLE</text>
    <text x="14" y="34" fill="#CCCCEE" font-size="11" font-weight="600">orders_raw</text>
    <text x="14" y="47" fill="#555580" font-size="8">12.7M rows · DQ: 98%</text>
    <circle cx="131" cy="14" r="5" fill="#22C55E"/>
